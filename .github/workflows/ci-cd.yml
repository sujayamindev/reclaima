name: CI and CD

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: ci-cd-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: "3.11"
  FLUTTER_CHANNEL: stable
  FLUTTER_VERSION: "3.41.4"
  BACKEND_IMAGE_REPOSITORY: ghcr.io/${{ github.repository_owner }}/smart-receipt-backend

jobs:
  secret_scan:
    name: Secret Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  backend_ci:
    name: Backend CI
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install bandit pip-audit

      - name: Ruff lint
        run: ruff check app tests

      - name: Black formatting (changed Python files)
        env:
          EVENT_NAME: ${{ github.event_name }}
          PR_BASE_SHA: ${{ github.event.pull_request.base.sha || '' }}
          PR_HEAD_SHA: ${{ github.event.pull_request.head.sha || '' }}
          PUSH_BASE_SHA: ${{ github.event.before || '' }}
          PUSH_HEAD_SHA: ${{ github.sha }}
        run: |
          if [ "$EVENT_NAME" = "pull_request" ]; then
            BASE_SHA="$PR_BASE_SHA"
            HEAD_SHA="$PR_HEAD_SHA"
          else
            BASE_SHA="$PUSH_BASE_SHA"
            HEAD_SHA="$PUSH_HEAD_SHA"
          fi

          if [ -z "$BASE_SHA" ] || [ "$BASE_SHA" = "0000000000000000000000000000000000000000" ]; then
            echo "Base SHA unavailable; running Black on app and tests."
            black --check app tests
            exit 0
          fi

          mapfile -t changed_py_files < <(
            git diff --name-only --diff-filter=ACMR "$BASE_SHA" "$HEAD_SHA" -- '*.py' \
            | sed 's#^backend/##'
          )

          if [ ${#changed_py_files[@]} -eq 0 ]; then
            echo "No changed Python files detected for Black check."
            exit 0
          fi

          echo "Black checking changed Python files:"
          printf '%s\n' "${changed_py_files[@]}"
          black --check "${changed_py_files[@]}"

      - name: Mypy type check
        run: mypy app

      - name: Pytest coverage gate
        run: >-
          pytest tests
          --cov=app
          --cov-config=.coveragerc
          --cov-report=term-missing
          --cov-report=xml:coverage.xml
          --cov-fail-under=100

      - name: Bandit security scan
        run: bandit -r app -q

      - name: Dependency vulnerability scan
        run: pip-audit -r requirements.txt

      - name: Upload backend coverage report
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage-xml
          path: backend/coverage.xml

  mobile_ci:
    name: Mobile CI
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: ${{ env.FLUTTER_CHANNEL }}
          flutter-version: ${{ env.FLUTTER_VERSION }}
          cache: true

      - name: Resolve dependencies
        working-directory: mobile
        run: flutter pub get

      - name: Validate generated files
        working-directory: mobile
        run: |
          flutter pub run build_runner build --delete-conflicting-outputs
          if [ -n "$(git status --porcelain)" ]; then
            echo "Generated files changed. Commit generated outputs before merging."
            git status --short
            exit 1
          fi

      - name: Analyze
        working-directory: mobile
        run: flutter analyze --fatal-infos --fatal-warnings

      - name: Test with coverage
        working-directory: mobile
        run: flutter test --coverage

      - name: Enforce mobile 100% coverage
        run: >-
          python scripts/ci/check_lcov.py
          mobile/coverage/lcov.info
          --threshold 100
          --exclude "**/*.g.dart"
          --exclude "**/*.freezed.dart"
          --exclude "**/generated_plugin_registrant.dart"

      - name: Build Android debug artifact
        working-directory: mobile
        run: flutter build apk --debug

      - name: Upload mobile coverage report
        uses: actions/upload-artifact@v4
        with:
          name: mobile-lcov
          path: mobile/coverage/lcov.info

      - name: Upload Android debug artifact
        uses: actions/upload-artifact@v4
        with:
          name: mobile-android-debug-apk
          path: mobile/build/app/outputs/flutter-apk/app-debug.apk

  backend_image:
    name: Build and Publish Backend Image
    needs:
      - secret_scan
      - backend_ci
      - mobile_ci
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      image_tag: ${{ steps.meta.outputs.image_tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup QEMU
        uses: docker/setup-qemu-action@v3

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image metadata
        id: meta
        run: echo "image_tag=sha-${GITHUB_SHA}" >> "$GITHUB_OUTPUT"

      - name: Build and push ARM64 image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile
          platforms: linux/arm64
          push: true
          tags: |
            ${{ env.BACKEND_IMAGE_REPOSITORY }}:${{ steps.meta.outputs.image_tag }}
            ${{ env.BACKEND_IMAGE_REPOSITORY }}:latest-prod
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.title=smart-receipt-backend

  deploy_backend_oci:
    name: Deploy Backend to OCI
    needs:
      - backend_image
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.OCI_SSH_PRIVATE_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H "${{ secrets.OCI_HOST }}" >> ~/.ssh/known_hosts

      - name: Sync deployment assets
        run: |
          ssh "${{ secrets.OCI_USER }}@${{ secrets.OCI_HOST }}" "mkdir -p /mnt/data/smart-receipt-and-warranty-manager/deploy/scripts /mnt/data/smart-receipt-and-warranty-manager/secrets"
          scp deploy/docker-compose.prod.yml "${{ secrets.OCI_USER }}@${{ secrets.OCI_HOST }}:/mnt/data/smart-receipt-and-warranty-manager/deploy/docker-compose.prod.yml"
          scp deploy/.env.prod.example "${{ secrets.OCI_USER }}@${{ secrets.OCI_HOST }}:/mnt/data/smart-receipt-and-warranty-manager/deploy/.env.prod.example"
          scp deploy/scripts/oci_deploy.sh "${{ secrets.OCI_USER }}@${{ secrets.OCI_HOST }}:/mnt/data/smart-receipt-and-warranty-manager/deploy/scripts/oci_deploy.sh"

      - name: Execute deployment
        run: |
          ssh "${{ secrets.OCI_USER }}@${{ secrets.OCI_HOST }}" "chmod +x /mnt/data/smart-receipt-and-warranty-manager/deploy/scripts/oci_deploy.sh"
          ssh "${{ secrets.OCI_USER }}@${{ secrets.OCI_HOST }}" \
            "GHCR_USERNAME='${{ secrets.GHCR_USERNAME }}' GHCR_TOKEN='${{ secrets.GHCR_READ_TOKEN }}' IMAGE_REPOSITORY='${{ env.BACKEND_IMAGE_REPOSITORY }}' IMAGE_TAG='${{ needs.backend_image.outputs.image_tag }}' DEPLOY_DIR='/mnt/data/smart-receipt-and-warranty-manager/deploy' ENV_FILE='/mnt/data/smart-receipt-and-warranty-manager/.env.prod' /mnt/data/smart-receipt-and-warranty-manager/deploy/scripts/oci_deploy.sh"
