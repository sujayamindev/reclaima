name: CI and CD

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      deploy:
        description: Deploy to production? (requires production environment approval)
        required: true
        default: false
        type: boolean

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: ci-cd-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

env:
  PYTHON_VERSION: "3.11"
  FLUTTER_CHANNEL: stable
  FLUTTER_VERSION: "3.41.7"
  BACKEND_IMAGE_REPOSITORY: ghcr.io/${{ github.repository_owner }}/smart-receipt-backend
  BACKEND_COVERAGE_FLOOR: "70.0"
  MOBILE_COVERAGE_FLOOR: "60.0"
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  secret_scan:
    name: Secret Scan
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  backend_ci:
    name: Backend CI
    needs:
      - secret_scan
    runs-on: ubuntu-latest
    timeout-minutes: 35
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: ci_test_user
          POSTGRES_PASSWORD: ci_test_pass
          POSTGRES_DB: ci_test_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U ci_test_user -d ci_test_db"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install bandit pip-audit

      - name: Ruff lint
        run: ruff check app tests

      - name: Black formatting (changed Python files)
        env:
          EVENT_NAME: ${{ github.event_name }}
          PR_BASE_SHA: ${{ github.event.pull_request.base.sha || '' }}
          PR_HEAD_SHA: ${{ github.event.pull_request.head.sha || '' }}
          PUSH_BASE_SHA: ${{ github.event.before || '' }}
          PUSH_HEAD_SHA: ${{ github.sha }}
        run: |
          if [ "$EVENT_NAME" = "pull_request" ]; then
            BASE_SHA="$PR_BASE_SHA"
            HEAD_SHA="$PR_HEAD_SHA"
          else
            BASE_SHA="$PUSH_BASE_SHA"
            HEAD_SHA="$PUSH_HEAD_SHA"
          fi

          if [ -z "$BASE_SHA" ] || [ "$BASE_SHA" = "0000000000000000000000000000000000000000" ]; then
            echo "Base SHA unavailable; running Black on app and tests."
            black --check app tests
            exit 0
          fi

          mapfile -t changed_py_files < <(
            git diff --name-only --diff-filter=ACMR "$BASE_SHA" "$HEAD_SHA" -- '*.py' \
            | sed 's#^backend/##'
          )

          if [ ${#changed_py_files[@]} -eq 0 ]; then
            echo "No changed Python files detected for Black check."
            exit 0
          fi

          echo "Black checking changed Python files:"
          printf '%s\n' "${changed_py_files[@]}"
          black --check "${changed_py_files[@]}"

      - name: Mypy type check (no-regression gate)
        env:
          EVENT_NAME: ${{ github.event_name }}
          PR_BASE_SHA: ${{ github.event.pull_request.base.sha || '' }}
          PR_HEAD_SHA: ${{ github.event.pull_request.head.sha || '' }}
          PUSH_BASE_SHA: ${{ github.event.before || '' }}
          PUSH_HEAD_SHA: ${{ github.sha }}
        run: bash ../scripts/ci/check_mypy.sh

      - name: Pytest and coverage (no-regression gate)
        env:
          EVENT_NAME: ${{ github.event_name }}
          PR_BASE_SHA: ${{ github.event.pull_request.base.sha || '' }}
          PR_HEAD_SHA: ${{ github.event.pull_request.head.sha || '' }}
          PUSH_BASE_SHA: ${{ github.event.before || '' }}
          PUSH_HEAD_SHA: ${{ github.sha }}
          SECRET_KEY: ci-test-secret-key
          DATABASE_URL: postgresql://ci_test_user:ci_test_pass@localhost:5432/ci_test_db
          AWS_ACCESS_KEY_ID: ci-mock-access-key
          AWS_SECRET_ACCESS_KEY: ci-mock-secret-key
          USE_MOCK_AWS: "true"
          ENABLE_SCHEDULER: "false"
        run: bash ../scripts/ci/check_pytest.sh

      - name: Alembic migration check
        env:
          DATABASE_URL: postgresql://ci_test_user:ci_test_pass@localhost:5432/ci_test_db
          SECRET_KEY: ci-test-secret-key
          AWS_ACCESS_KEY_ID: ci-mock-access-key
          AWS_SECRET_ACCESS_KEY: ci-mock-secret-key
        run: |
          alembic upgrade head
          alembic check

      - name: Bandit security scan (no-regression gate)
        env:
          EVENT_NAME: ${{ github.event_name }}
          PR_BASE_SHA: ${{ github.event.pull_request.base.sha || '' }}
          PR_HEAD_SHA: ${{ github.event.pull_request.head.sha || '' }}
          PUSH_BASE_SHA: ${{ github.event.before || '' }}
          PUSH_HEAD_SHA: ${{ github.sha }}
        run: bash ../scripts/ci/check_bandit.sh

      - name: Dependency vulnerability scan (no-regression gate)
        env:
          EVENT_NAME: ${{ github.event_name }}
          PR_BASE_SHA: ${{ github.event.pull_request.base.sha || '' }}
          PR_HEAD_SHA: ${{ github.event.pull_request.head.sha || '' }}
          PUSH_BASE_SHA: ${{ github.event.before || '' }}
          PUSH_HEAD_SHA: ${{ github.sha }}
        run: bash ../scripts/ci/check_pip_audit.sh

      - name: Upload backend coverage report
        uses: actions/upload-artifact@v7
        with:
          name: backend-coverage-xml
          path: backend/coverage.xml

  mobile_ci:
    name: Mobile CI
    needs:
      - secret_scan
    runs-on: ubuntu-latest
    timeout-minutes: 35
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: ${{ env.FLUTTER_CHANNEL }}
          flutter-version: ${{ env.FLUTTER_VERSION }}
          cache: true

      - name: Cache pub packages
        uses: actions/cache@v5
        with:
          path: ~/.pub-cache
          key: pub-${{ runner.os }}-${{ hashFiles('mobile/pubspec.lock') }}
          restore-keys: pub-${{ runner.os }}-

      - name: Resolve dependencies
        working-directory: mobile
        run: flutter pub get

      - name: Validate generated files
        working-directory: mobile
        run: |
          flutter pub run build_runner build --delete-conflicting-outputs
          # Normalize generated output formatting before cleanliness checks.
          dart format lib test
          if [ -n "$(git status --porcelain)" ]; then
            echo "Generated files changed. Commit generated outputs before merging."
            git status --short
            exit 1
          fi

      - name: Dart format check
        working-directory: mobile
        run: dart format --set-exit-if-changed lib test

      - name: Analyze (no-regression gate)
        working-directory: mobile
        env:
          EVENT_NAME: ${{ github.event_name }}
          PR_BASE_SHA: ${{ github.event.pull_request.base.sha || '' }}
          PUSH_BASE_SHA: ${{ github.event.before || '' }}
        run: bash ../scripts/ci/check_flutter_analyze.sh

      - name: Test with coverage
        working-directory: mobile
        run: flutter test --coverage

      - name: Enforce mobile coverage (no-regression gate)
        env:
          EVENT_NAME: ${{ github.event_name }}
          PR_BASE_SHA: ${{ github.event.pull_request.base.sha || '' }}
          PUSH_BASE_SHA: ${{ github.event.before || '' }}
          MOBILE_COVERAGE_FLOOR: ${{ env.MOBILE_COVERAGE_FLOOR }}
        run: bash scripts/ci/check_mobile_coverage.sh

      - name: Provision Android Firebase config (optional)
        id: android_firebase
        working-directory: mobile
        env:
          ANDROID_GOOGLE_SERVICES_JSON: ${{ secrets.ANDROID_GOOGLE_SERVICES_JSON }}
        run: |
          if [ -f android/app/google-services.json ]; then
            echo "google-services.json found in repository checkout."
            echo "available=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [ -n "$ANDROID_GOOGLE_SERVICES_JSON" ]; then
            printf '%s' "$ANDROID_GOOGLE_SERVICES_JSON" > android/app/google-services.json
            echo "google-services.json written from secret ANDROID_GOOGLE_SERVICES_JSON."
            echo "available=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "google-services.json not available; skipping Android debug APK build for this CI run."
          echo "available=false" >> "$GITHUB_OUTPUT"

      - name: Build Android debug artifact
        if: steps.android_firebase.outputs.available == 'true'
        working-directory: mobile
        run: flutter build apk --debug

      - name: Skip Android debug artifact build
        if: steps.android_firebase.outputs.available != 'true'
        run: echo "Android debug APK build skipped because Firebase config is unavailable in CI context."

      - name: Upload mobile coverage report
        uses: actions/upload-artifact@v7
        with:
          name: mobile-lcov
          path: mobile/coverage/lcov.info

      - name: Upload Android debug artifact
        if: steps.android_firebase.outputs.available == 'true'
        uses: actions/upload-artifact@v7
        with:
          name: mobile-android-debug-apk
          path: mobile/build/app/outputs/flutter-apk/app-debug.apk

  krakend_check:
    name: KrakenD Config Check
    needs:
      - secret_scan
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Validate krakend.tmpl
        run: >-
          docker run --rm
          -e FC_ENABLE=1
          -e FIREBASE_PROJECT_ID=ci-placeholder
          -v "${{ github.workspace }}:/etc/krakend"
          devopsfaith/krakend:2
          check -c /etc/krakend/krakend.tmpl

  backend_image:
    name: Build and Publish Backend Image
    needs:
      - secret_scan
      - backend_ci
      - mobile_ci
      - krakend_check
    if: >-
      github.ref == 'refs/heads/main' &&
      (
        github.event_name == 'push' ||
        (github.event_name == 'workflow_dispatch' && github.event.inputs.deploy == 'true')
      )
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      packages: write
      id-token: write
    outputs:
      image_tag: ${{ steps.meta.outputs.image_tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup QEMU
        uses: docker/setup-qemu-action@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image metadata
        id: meta
        run: echo "image_tag=sha-${GITHUB_SHA}" >> "$GITHUB_OUTPUT"

      - name: Build and push multi-arch image
        uses: docker/build-push-action@v7
        with:
          context: ./backend
          file: ./backend/Dockerfile
          platforms: linux/arm64,linux/amd64
          push: true
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: |
            ${{ env.BACKEND_IMAGE_REPOSITORY }}:${{ steps.meta.outputs.image_tag }}
            ${{ env.BACKEND_IMAGE_REPOSITORY }}:latest-prod
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.title=smart-receipt-backend

      - name: Scan image for vulnerabilities
        # Pinned to SHA of v0.36.0 (2026-04-22): first clean release after the March 2026 tag-poisoning attack.
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25
        with:
          image-ref: ${{ env.BACKEND_IMAGE_REPOSITORY }}:${{ steps.meta.outputs.image_tag }}
          format: table
          ignore-unfixed: true
          severity: CRITICAL,HIGH
          vuln-type: os,library
          exit-code: "1"

      - name: Generate SBOM
        uses: anchore/sbom-action@v0
        with:
          image: ${{ env.BACKEND_IMAGE_REPOSITORY }}:${{ steps.meta.outputs.image_tag }}
          artifact-name: sbom-${{ steps.meta.outputs.image_tag }}.spdx.json
          format: spdx-json

      - name: Install Cosign
        uses: sigstore/cosign-installer@v3

      - name: Sign image
        run: cosign sign --yes ${{ env.BACKEND_IMAGE_REPOSITORY }}:${{ steps.meta.outputs.image_tag }}

  deploy_backend_oci:
    name: Deploy Backend to OCI
    needs:
      - backend_image
    if: >-
      github.ref == 'refs/heads/main' &&
      (
        github.event_name == 'push' ||
        (github.event_name == 'workflow_dispatch' && github.event.inputs.deploy == 'true')
      )
    runs-on: ubuntu-latest
    timeout-minutes: 25
    environment: production
    env:
      SLACK_DEPLOY_WEBHOOK: ${{ secrets.SLACK_DEPLOY_WEBHOOK }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Configure SSH
        env:
          OCI_SSH_PRIVATE_KEY: ${{ secrets.OCI_SSH_PRIVATE_KEY }}
          OCI_KNOWN_HOST: ${{ secrets.OCI_KNOWN_HOST }}
        run: |
          mkdir -p ~/.ssh

          if [ -z "$OCI_SSH_PRIVATE_KEY" ]; then
            echo "Missing required secret: OCI_SSH_PRIVATE_KEY"
            exit 1
          fi

          # Support both real newlines and literal "\\n" sequences from secret stores.
          KEY_NORMALIZED="${OCI_SSH_PRIVATE_KEY//$'\\n'/$'\n'}"
          printf '%s\n' "$KEY_NORMALIZED" | sed 's/\r$//' > ~/.ssh/id_ed25519

          # If the key is base64-encoded, decode it.
          if ! grep -q "BEGIN .*PRIVATE KEY" ~/.ssh/id_ed25519; then
            if printf '%s' "$OCI_SSH_PRIVATE_KEY" | base64 --decode > ~/.ssh/id_ed25519 2>/dev/null; then
              sed -i 's/\r$//' ~/.ssh/id_ed25519
            else
              echo "OCI_SSH_PRIVATE_KEY format is invalid (expected private key text or base64-encoded key)."
              exit 1
            fi
          fi

          chmod 600 ~/.ssh/id_ed25519

          if ! ssh-keygen -y -f ~/.ssh/id_ed25519 >/dev/null 2>&1; then
            echo "Unable to parse OCI_SSH_PRIVATE_KEY; check key content and formatting."
            exit 1
          fi

          if [ -n "$OCI_KNOWN_HOST" ]; then
            printf '%s\n' "$OCI_KNOWN_HOST" >> ~/.ssh/known_hosts
          else
            echo "OCI_KNOWN_HOST not provided; configuring SSH to accept new hosts automatically."
            printf "Host *\n\tStrictHostKeyChecking accept-new\n" > ~/.ssh/config
            chmod 600 ~/.ssh/config
          fi

      - name: Sync deployment assets
        run: |
          ssh "${{ secrets.OCI_USER }}@${{ secrets.OCI_HOST }}" "mkdir -p /mnt/data/smart-receipt-and-warranty-manager/deploy/scripts /mnt/data/smart-receipt-and-warranty-manager/secrets /mnt/data/smart-receipt-and-warranty-manager/deploy/monitoring /mnt/data/smart-receipt-and-warranty-manager/deploy/postgres"
          scp krakend.tmpl "${{ secrets.OCI_USER }}@${{ secrets.OCI_HOST }}:/mnt/data/smart-receipt-and-warranty-manager/krakend.tmpl"
          scp deploy/docker-compose.prod.yml "${{ secrets.OCI_USER }}@${{ secrets.OCI_HOST }}:/mnt/data/smart-receipt-and-warranty-manager/deploy/docker-compose.prod.yml"
          scp deploy/postgres/pg_hba.conf "${{ secrets.OCI_USER }}@${{ secrets.OCI_HOST }}:/mnt/data/smart-receipt-and-warranty-manager/deploy/postgres/pg_hba.conf"
          scp deploy/docker-compose.monitoring.yml "${{ secrets.OCI_USER }}@${{ secrets.OCI_HOST }}:/mnt/data/smart-receipt-and-warranty-manager/deploy/docker-compose.monitoring.yml"
          scp deploy/monitoring/prometheus.yml "${{ secrets.OCI_USER }}@${{ secrets.OCI_HOST }}:/mnt/data/smart-receipt-and-warranty-manager/deploy/monitoring/prometheus.yml"
          scp deploy/monitoring/promtail-config.yml "${{ secrets.OCI_USER }}@${{ secrets.OCI_HOST }}:/mnt/data/smart-receipt-and-warranty-manager/deploy/monitoring/promtail-config.yml"
          scp deploy/.env.prod.example "${{ secrets.OCI_USER }}@${{ secrets.OCI_HOST }}:/mnt/data/smart-receipt-and-warranty-manager/deploy/.env.prod.example"
          scp deploy/scripts/oci_deploy.sh "${{ secrets.OCI_USER }}@${{ secrets.OCI_HOST }}:/mnt/data/smart-receipt-and-warranty-manager/deploy/scripts/oci_deploy.sh"

      - name: Execute deployment
        run: |
          ssh "${{ secrets.OCI_USER }}@${{ secrets.OCI_HOST }}" "chmod +x /mnt/data/smart-receipt-and-warranty-manager/deploy/scripts/oci_deploy.sh"
          ssh "${{ secrets.OCI_USER }}@${{ secrets.OCI_HOST }}" \
            "GHCR_USERNAME='${{ secrets.GHCR_USERNAME }}' GHCR_TOKEN='${{ secrets.GHCR_READ_TOKEN }}' IMAGE_REPOSITORY='${{ env.BACKEND_IMAGE_REPOSITORY }}' IMAGE_TAG='${{ needs.backend_image.outputs.image_tag }}' DEPLOY_DIR='/mnt/data/smart-receipt-and-warranty-manager/deploy' ENV_FILE='/mnt/data/smart-receipt-and-warranty-manager/.env.prod' SMOKE_TEST_URL='${{ secrets.DEPLOY_SMOKE_TEST_URL }}' SMOKE_TEST_TOKEN='${{ secrets.DEPLOY_SMOKE_TEST_TOKEN }}' INFISICAL_CLIENT_ID='${{ secrets.INFISICAL_ID }}' INFISICAL_CLIENT_SECRET='${{ secrets.INFISICAL_SECRET }}' INFISICAL_PROJECT_ID='${{ secrets.INFISICAL_PROJECT_ID }}' /mnt/data/smart-receipt-and-warranty-manager/deploy/scripts/oci_deploy.sh"

      - name: Notify on deployment failure
        if: ${{ failure() && env.SLACK_DEPLOY_WEBHOOK != '' }}
        uses: slackapi/slack-github-action@v3
        with:
          webhook: ${{ secrets.SLACK_DEPLOY_WEBHOOK }}
          webhook-type: incoming-webhook
          payload: |
            {
              "text": ":rotating_light: Production deploy failed for ${{ github.repository }} at commit ${{ github.sha }}. Run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
            }
