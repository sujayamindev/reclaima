name: CI and CD

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      deploy:
        description: Deploy to production? (requires production environment approval)
        required: true
        default: false
        type: boolean

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: ci-cd-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

env:
  PYTHON_VERSION: "3.11"
  FLUTTER_CHANNEL: stable
  FLUTTER_VERSION: "3.41.4"
  BACKEND_IMAGE_REPOSITORY: ghcr.io/${{ github.repository_owner }}/smart-receipt-backend
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  BACKEND_COVERAGE_FLOOR: "70.0"
  MOBILE_COVERAGE_FLOOR: "60.0"

jobs:
  secret_scan:
    name: Secret Scan
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  backend_ci:
    name: Backend CI
    needs:
      - secret_scan
    runs-on: ubuntu-latest
    timeout-minutes: 35
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: ci_test_user
          POSTGRES_PASSWORD: ci_test_pass
          POSTGRES_DB: ci_test_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U ci_test_user -d ci_test_db"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install bandit pip-audit

      - name: Ruff lint
        run: ruff check app tests

      - name: Black formatting (changed Python files)
        env:
          EVENT_NAME: ${{ github.event_name }}
          PR_BASE_SHA: ${{ github.event.pull_request.base.sha || '' }}
          PR_HEAD_SHA: ${{ github.event.pull_request.head.sha || '' }}
          PUSH_BASE_SHA: ${{ github.event.before || '' }}
          PUSH_HEAD_SHA: ${{ github.sha }}
        run: |
          if [ "$EVENT_NAME" = "pull_request" ]; then
            BASE_SHA="$PR_BASE_SHA"
            HEAD_SHA="$PR_HEAD_SHA"
          else
            BASE_SHA="$PUSH_BASE_SHA"
            HEAD_SHA="$PUSH_HEAD_SHA"
          fi

          if [ -z "$BASE_SHA" ] || [ "$BASE_SHA" = "0000000000000000000000000000000000000000" ]; then
            echo "Base SHA unavailable; running Black on app and tests."
            black --check app tests
            exit 0
          fi

          mapfile -t changed_py_files < <(
            git diff --name-only --diff-filter=ACMR "$BASE_SHA" "$HEAD_SHA" -- '*.py' \
            | sed 's#^backend/##'
          )

          if [ ${#changed_py_files[@]} -eq 0 ]; then
            echo "No changed Python files detected for Black check."
            exit 0
          fi

          echo "Black checking changed Python files:"
          printf '%s\n' "${changed_py_files[@]}"
          black --check "${changed_py_files[@]}"

      - name: Mypy type check (no-regression gate)
        env:
          EVENT_NAME: ${{ github.event_name }}
          PR_BASE_SHA: ${{ github.event.pull_request.base.sha || '' }}
          PR_HEAD_SHA: ${{ github.event.pull_request.head.sha || '' }}
          PUSH_BASE_SHA: ${{ github.event.before || '' }}
          PUSH_HEAD_SHA: ${{ github.sha }}
        run: |
          if [ "$EVENT_NAME" = "pull_request" ]; then
            BASE_SHA="$PR_BASE_SHA"
            TARGET_SHA="$PR_HEAD_SHA"
          else
            BASE_SHA="$PUSH_BASE_SHA"
            TARGET_SHA="$PUSH_HEAD_SHA"
          fi

          ORIGINAL_SHA="$(git rev-parse HEAD)"

          if [ -n "$TARGET_SHA" ] && [ "$TARGET_SHA" != "$ORIGINAL_SHA" ]; then
            git checkout --quiet "$TARGET_SHA"
          fi

          set +e
          mypy app > /tmp/mypy_head.txt 2>&1
          HEAD_STATUS=$?
          set -e

          if [ -z "$BASE_SHA" ] || [ "$BASE_SHA" = "0000000000000000000000000000000000000000" ]; then
            cat /tmp/mypy_head.txt
            exit $HEAD_STATUS
          fi

          if ! git cat-file -e "${BASE_SHA}^{commit}" 2>/dev/null; then
            echo "Base SHA not available locally; running mypy on target revision only."
            cat /tmp/mypy_head.txt
            exit $HEAD_STATUS
          fi

          git checkout --quiet "$BASE_SHA"
          set +e
          mypy app > /tmp/mypy_base.txt 2>&1
          set -e

          git checkout --quiet "$ORIGINAL_SHA"

          if [ $HEAD_STATUS -eq 0 ]; then
            echo "Mypy passed on target revision."
            exit 0
          fi

          grep -E '^[^:]+:[0-9]+: error:' /tmp/mypy_base.txt \
            | sed -E 's#:[0-9]+: error:#: error:#' \
            | sort -u > /tmp/mypy_base_errors.txt || true
          grep -E '^[^:]+:[0-9]+: error:' /tmp/mypy_head.txt \
            | sed -E 's#:[0-9]+: error:#: error:#' \
            | sort -u > /tmp/mypy_head_errors.txt || true
          comm -13 /tmp/mypy_base_errors.txt /tmp/mypy_head_errors.txt > /tmp/mypy_new_errors.txt || true

          if [ -s /tmp/mypy_new_errors.txt ]; then
            echo "New mypy errors introduced compared to base commit:"
            cat /tmp/mypy_new_errors.txt
            echo
            echo "Full mypy output on target revision:"
            cat /tmp/mypy_head.txt
            exit 1
          fi

          echo "No new mypy errors compared to base commit; existing baseline debt tolerated."
          echo "Mypy summary on target revision:"
          tail -n 5 /tmp/mypy_head.txt || true

      - name: Pytest and coverage (no-regression gate)
        env:
          EVENT_NAME: ${{ github.event_name }}
          PR_BASE_SHA: ${{ github.event.pull_request.base.sha || '' }}
          PR_HEAD_SHA: ${{ github.event.pull_request.head.sha || '' }}
          PUSH_BASE_SHA: ${{ github.event.before || '' }}
          PUSH_HEAD_SHA: ${{ github.sha }}
          SECRET_KEY: ci-test-secret-key
          DATABASE_URL: postgresql://ci_test_user:ci_test_pass@localhost:5432/ci_test_db
          AWS_ACCESS_KEY_ID: ci-mock-access-key
          AWS_SECRET_ACCESS_KEY: ci-mock-secret-key
          USE_MOCK_AWS: "true"
          ENABLE_SCHEDULER: "false"
        run: |
          if [ "$EVENT_NAME" = "pull_request" ]; then
            BASE_SHA="$PR_BASE_SHA"
            TARGET_SHA="$PR_HEAD_SHA"
          else
            BASE_SHA="$PUSH_BASE_SHA"
            TARGET_SHA="$PUSH_HEAD_SHA"
          fi

          ORIGINAL_SHA="$(git rev-parse HEAD)"

          if [ -n "$TARGET_SHA" ] && [ "$TARGET_SHA" != "$ORIGINAL_SHA" ]; then
            git checkout --quiet "$TARGET_SHA"
          fi

          set +e
          pytest tests \
            --cov=app \
            --cov-config=.coveragerc \
            --cov-report=term-missing \
            --cov-report=xml:/tmp/coverage_head.xml > /tmp/pytest_head.txt 2>&1
          HEAD_STATUS=$?
          set -e

          if [ $HEAD_STATUS -ne 0 ]; then
            cat /tmp/pytest_head.txt
            exit $HEAD_STATUS
          fi

          if [ -z "$BASE_SHA" ] || [ "$BASE_SHA" = "0000000000000000000000000000000000000000" ]; then
            cat /tmp/pytest_head.txt
            cp /tmp/coverage_head.xml coverage.xml
            exit 0
          fi

          if ! git cat-file -e "${BASE_SHA}^{commit}" 2>/dev/null; then
            echo "Base SHA not available locally; skipping backend coverage regression comparison."
            cat /tmp/pytest_head.txt
            cp /tmp/coverage_head.xml coverage.xml
            exit 0
          fi

          git checkout --quiet "$BASE_SHA"
          set +e
          pytest tests \
            --cov=app \
            --cov-config=.coveragerc \
            --cov-report=term \
            --cov-report=xml:/tmp/coverage_base.xml > /tmp/pytest_base.txt 2>&1
          BASE_STATUS=$?
          set -e

          git checkout --quiet "$ORIGINAL_SHA"

          if [ $BASE_STATUS -ne 0 ]; then
            echo "Base revision tests failed; skipping coverage regression comparison."
            cat /tmp/pytest_head.txt
            cp /tmp/coverage_head.xml coverage.xml
            exit 0
          fi

          COVERAGE_COMPARE_STATUS=0
          COVERAGE_FLOOR_STATUS=0
          BASE_COVERAGE="$(python -c "import xml.etree.ElementTree as ET; print(float(ET.parse('/tmp/coverage_base.xml').getroot().attrib.get('line-rate', '0')) * 100.0)")"
          HEAD_COVERAGE="$(python -c "import xml.etree.ElementTree as ET; print(float(ET.parse('/tmp/coverage_head.xml').getroot().attrib.get('line-rate', '0')) * 100.0)")"
          COVERAGE_FLOOR="${BACKEND_COVERAGE_FLOOR:-33.0}"
          printf 'Base coverage: %.2f%%\n' "$BASE_COVERAGE"
          printf 'Head coverage: %.2f%%\n' "$HEAD_COVERAGE"
          printf 'Coverage floor: %.2f%%\n' "$COVERAGE_FLOOR"

          python -c "import sys; floor=float('$COVERAGE_FLOOR'); head=float('$HEAD_COVERAGE'); sys.exit(0 if head + 1e-9 >= floor else 2)" || COVERAGE_FLOOR_STATUS=$?

          if [ $COVERAGE_FLOOR_STATUS -ne 0 ]; then
            echo "Coverage is below the minimum floor."
            cat /tmp/pytest_head.txt
            exit 1
          fi

          python -c "import sys; base=float('$BASE_COVERAGE'); head=float('$HEAD_COVERAGE'); sys.exit(0 if head + 1e-9 >= base else 2)" || COVERAGE_COMPARE_STATUS=$?

          if [ $COVERAGE_COMPARE_STATUS -ne 0 ]; then
            echo "Coverage regressed compared to base revision."
            cat /tmp/pytest_head.txt
            exit 1
          fi

          cat /tmp/pytest_head.txt
          cp /tmp/coverage_head.xml coverage.xml

      - name: Bandit security scan (no-regression gate)
        env:
          EVENT_NAME: ${{ github.event_name }}
          PR_BASE_SHA: ${{ github.event.pull_request.base.sha || '' }}
          PR_HEAD_SHA: ${{ github.event.pull_request.head.sha || '' }}
          PUSH_BASE_SHA: ${{ github.event.before || '' }}
          PUSH_HEAD_SHA: ${{ github.sha }}
        run: |
          if [ "$EVENT_NAME" = "pull_request" ]; then
            BASE_SHA="$PR_BASE_SHA"
            TARGET_SHA="$PR_HEAD_SHA"
          else
            BASE_SHA="$PUSH_BASE_SHA"
            TARGET_SHA="$PUSH_HEAD_SHA"
          fi

          ORIGINAL_SHA="$(git rev-parse HEAD)"

          if [ -n "$TARGET_SHA" ] && [ "$TARGET_SHA" != "$ORIGINAL_SHA" ]; then
            git checkout --quiet "$TARGET_SHA"
          fi

          set +e
          bandit -r app -q > /tmp/bandit_head.txt 2>&1
          HEAD_STATUS=$?
          set -e

          if [ -z "$BASE_SHA" ] || [ "$BASE_SHA" = "0000000000000000000000000000000000000000" ]; then
            cat /tmp/bandit_head.txt
            exit $HEAD_STATUS
          fi

          if ! git cat-file -e "${BASE_SHA}^{commit}" 2>/dev/null; then
            echo "Base SHA not available locally; running Bandit on target revision only."
            cat /tmp/bandit_head.txt
            exit $HEAD_STATUS
          fi

          git checkout --quiet "$BASE_SHA"
          set +e
          bandit -r app -q > /tmp/bandit_base.txt 2>&1
          BASE_STATUS=$?
          set -e

          git checkout --quiet "$ORIGINAL_SHA"

          if [ $BASE_STATUS -ge 2 ]; then
            echo "Base revision Bandit scan failed; skipping regression comparison."
            cat /tmp/bandit_head.txt
            exit 0
          fi

          awk '
            /^>> Issue: \[/ {issue=$0}
            /^   Location: / {
              location=$0
              sub(/:[0-9]+:[0-9]+$/,":<line>", location)
              sub(/:[0-9]+$/,":<line>", location)
              if (issue != "") print issue " | " location
            }
          ' /tmp/bandit_base.txt | sort -u > /tmp/bandit_base_findings.txt || true

          awk '
            /^>> Issue: \[/ {issue=$0}
            /^   Location: / {
              location=$0
              sub(/:[0-9]+:[0-9]+$/,":<line>", location)
              sub(/:[0-9]+$/,":<line>", location)
              if (issue != "") print issue " | " location
            }
          ' /tmp/bandit_head.txt | sort -u > /tmp/bandit_head_findings.txt || true

          comm -13 /tmp/bandit_base_findings.txt /tmp/bandit_head_findings.txt > /tmp/bandit_new_findings.txt || true

          if [ -s /tmp/bandit_new_findings.txt ]; then
            echo "New Bandit findings introduced compared to base commit:"
            cat /tmp/bandit_new_findings.txt
            echo
            echo "Full Bandit output on target revision:"
            cat /tmp/bandit_head.txt
            exit 1
          fi

          if [ $HEAD_STATUS -ne 0 ]; then
            echo "No new Bandit findings compared to base commit; existing baseline findings tolerated."
            cat /tmp/bandit_head.txt
            exit 0
          fi

          echo "Bandit passed on target revision."

      - name: Dependency vulnerability scan (no-regression gate)
        env:
          EVENT_NAME: ${{ github.event_name }}
          PR_BASE_SHA: ${{ github.event.pull_request.base.sha || '' }}
          PR_HEAD_SHA: ${{ github.event.pull_request.head.sha || '' }}
          PUSH_BASE_SHA: ${{ github.event.before || '' }}
          PUSH_HEAD_SHA: ${{ github.sha }}
        run: |
          if [ "$EVENT_NAME" = "pull_request" ]; then
            BASE_SHA="$PR_BASE_SHA"
            TARGET_SHA="$PR_HEAD_SHA"
          else
            BASE_SHA="$PUSH_BASE_SHA"
            TARGET_SHA="$PUSH_HEAD_SHA"
          fi

          ORIGINAL_SHA="$(git rev-parse HEAD)"

          if [ -n "$TARGET_SHA" ] && [ "$TARGET_SHA" != "$ORIGINAL_SHA" ]; then
            git checkout --quiet "$TARGET_SHA"
          fi

          set +e
          pip-audit -r requirements.txt > /tmp/pip_audit_head.txt 2>&1
          HEAD_STATUS=$?
          set -e

          if [ $HEAD_STATUS -ge 2 ]; then
            cat /tmp/pip_audit_head.txt
            exit $HEAD_STATUS
          fi

          if [ -z "$BASE_SHA" ] || [ "$BASE_SHA" = "0000000000000000000000000000000000000000" ]; then
            cat /tmp/pip_audit_head.txt
            exit $HEAD_STATUS
          fi

          if ! git cat-file -e "${BASE_SHA}^{commit}" 2>/dev/null; then
            echo "Base SHA not available locally; running pip-audit on target revision only."
            cat /tmp/pip_audit_head.txt
            exit $HEAD_STATUS
          fi

          git checkout --quiet "$BASE_SHA"
          set +e
          pip-audit -r requirements.txt > /tmp/pip_audit_base.txt 2>&1
          BASE_STATUS=$?
          set -e

          git checkout --quiet "$ORIGINAL_SHA"

          if [ $BASE_STATUS -ge 2 ]; then
            echo "Base revision pip-audit scan failed; skipping regression comparison."
            cat /tmp/pip_audit_head.txt
            exit 0
          fi

          awk 'NR > 2 && NF >= 3 {print $1 " | " $3}' /tmp/pip_audit_base.txt \
            | sort -u > /tmp/pip_audit_base_findings.txt || true
          awk 'NR > 2 && NF >= 3 {print $1 " | " $3}' /tmp/pip_audit_head.txt \
            | sort -u > /tmp/pip_audit_head_findings.txt || true
          comm -13 /tmp/pip_audit_base_findings.txt /tmp/pip_audit_head_findings.txt > /tmp/pip_audit_new_findings.txt || true

          if [ -s /tmp/pip_audit_new_findings.txt ]; then
            echo "New dependency vulnerabilities introduced compared to base commit:"
            cat /tmp/pip_audit_new_findings.txt
            echo
            echo "Full pip-audit output on target revision:"
            cat /tmp/pip_audit_head.txt
            exit 1
          fi

          if [ $HEAD_STATUS -ne 0 ]; then
            echo "No new dependency vulnerabilities compared to base commit; existing baseline findings tolerated."
            cat /tmp/pip_audit_head.txt
            exit 0
          fi

          echo "pip-audit passed on target revision."

      - name: Upload backend coverage report
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage-xml
          path: backend/coverage.xml

  mobile_ci:
    name: Mobile CI
    needs:
      - secret_scan
    runs-on: ubuntu-latest
    timeout-minutes: 35
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: ${{ env.FLUTTER_CHANNEL }}
          flutter-version: ${{ env.FLUTTER_VERSION }}
          cache: true

      - name: Resolve dependencies
        working-directory: mobile
        run: flutter pub get

      - name: Validate generated files
        working-directory: mobile
        run: |
          flutter pub run build_runner build --delete-conflicting-outputs
          # Normalize generated output formatting before cleanliness checks.
          dart format lib test
          if [ -n "$(git status --porcelain)" ]; then
            echo "Generated files changed. Commit generated outputs before merging."
            git status --short
            exit 1
          fi

      - name: Dart format check
        working-directory: mobile
        run: dart format --set-exit-if-changed lib test

      - name: Analyze (no-regression gate)
        working-directory: mobile
        env:
          EVENT_NAME: ${{ github.event_name }}
          PR_BASE_SHA: ${{ github.event.pull_request.base.sha || '' }}
          PUSH_BASE_SHA: ${{ github.event.before || '' }}
        run: |
          if [ "$EVENT_NAME" = "pull_request" ]; then
            BASE_SHA="$PR_BASE_SHA"
          else
            BASE_SHA="$PUSH_BASE_SHA"
          fi

          ORIGINAL_SHA="$(git rev-parse HEAD)"

          set +e
          flutter analyze --machine --fatal-infos --fatal-warnings > /tmp/flutter_analyze_head.txt 2>&1
          HEAD_STATUS=$?
          set -e

          if [ -z "$BASE_SHA" ] || [ "$BASE_SHA" = "0000000000000000000000000000000000000000" ]; then
            cat /tmp/flutter_analyze_head.txt
            exit $HEAD_STATUS
          fi

          if ! git cat-file -e "${BASE_SHA}^{commit}" 2>/dev/null; then
            echo "Base SHA not available locally; running analyze on current revision only."
            cat /tmp/flutter_analyze_head.txt
            exit $HEAD_STATUS
          fi

          git checkout --quiet "$BASE_SHA"
          set +e
          flutter analyze --machine --fatal-infos --fatal-warnings > /tmp/flutter_analyze_base.txt 2>&1
          BASE_STATUS=$?
          set -e

          git checkout --quiet "$ORIGINAL_SHA"

          if [ $BASE_STATUS -ge 2 ]; then
            echo "Base revision Flutter analyze failed unexpectedly; skipping regression comparison."
            cat /tmp/flutter_analyze_head.txt
            exit 0
          fi

          awk -F' - ' '
            /^[[:space:]]*(error|warning|info) - / {
              sev = $1
              msg = $2
              loc = $3
              code = $4

              if (loc == "" || code == "") {
                next
              }

              gsub(/^[[:space:]]+|[[:space:]]+$/, "", sev)
              gsub(/^[[:space:]]+|[[:space:]]+$/, "", code)
              sub(/:[0-9]+:[0-9]+$/, ":<line>", loc)

              print sev " | " msg " | " loc " | " code
            }
          ' /tmp/flutter_analyze_base.txt | sort -u > /tmp/flutter_analyze_base_issues.txt || true

          awk -F' - ' '
            /^[[:space:]]*(error|warning|info) - / {
              sev = $1
              msg = $2
              loc = $3
              code = $4

              if (loc == "" || code == "") {
                next
              }

              gsub(/^[[:space:]]+|[[:space:]]+$/, "", sev)
              gsub(/^[[:space:]]+|[[:space:]]+$/, "", code)
              sub(/:[0-9]+:[0-9]+$/, ":<line>", loc)

              print sev " | " msg " | " loc " | " code
            }
          ' /tmp/flutter_analyze_head.txt | sort -u > /tmp/flutter_analyze_head_issues.txt || true

          comm -13 /tmp/flutter_analyze_base_issues.txt /tmp/flutter_analyze_head_issues.txt > /tmp/flutter_analyze_new_issues.txt || true

          if [ -s /tmp/flutter_analyze_new_issues.txt ]; then
            echo "New Flutter analyzer findings introduced compared to base commit:"
            cat /tmp/flutter_analyze_new_issues.txt
            echo
            echo "Full Flutter analyze output on target revision:"
            cat /tmp/flutter_analyze_head.txt
            exit 1
          fi

          if [ $HEAD_STATUS -ne 0 ]; then
            echo "No new Flutter analyzer findings compared to base commit; existing baseline findings tolerated."
            cat /tmp/flutter_analyze_head.txt
            exit 0
          fi

          echo "Flutter analyze passed on target revision."

      - name: Test with coverage
        working-directory: mobile
        run: flutter test --coverage

      - name: Enforce mobile coverage (no-regression gate)
        env:
          EVENT_NAME: ${{ github.event_name }}
          PR_BASE_SHA: ${{ github.event.pull_request.base.sha || '' }}
          PUSH_BASE_SHA: ${{ github.event.before || '' }}
          MOBILE_COVERAGE_FLOOR: ${{ env.MOBILE_COVERAGE_FLOOR }}
        run: |
          EXCLUDE_ARGS=(
            --exclude "**/*.g.dart"
            --exclude "**/*.freezed.dart"
            --exclude "**/generated_plugin_registrant.dart"
          )

          ORIGINAL_SHA="$(git rev-parse HEAD)"
          cp mobile/coverage/lcov.info /tmp/mobile_lcov_head.info

          HEAD_COVERAGE="$(python scripts/ci/check_lcov.py /tmp/mobile_lcov_head.info --threshold 0 "${EXCLUDE_ARGS[@]}" | awk '/^Coverage:/ {gsub("%", "", $2); print $2}')"
          if [ -z "$HEAD_COVERAGE" ]; then
            echo "Unable to compute head mobile coverage."
            exit 1
          fi

          printf 'Head mobile coverage: %.2f%%\n' "$HEAD_COVERAGE"

          set +e
          python -c "import sys; floor=float('${MOBILE_COVERAGE_FLOOR:-60.0}'); head=float('$HEAD_COVERAGE'); sys.exit(0 if head + 1e-9 >= floor else 2)"
          COVERAGE_FLOOR_STATUS=$?
          set -e
          if [ $COVERAGE_FLOOR_STATUS -ne 0 ]; then
            echo "Mobile coverage ${HEAD_COVERAGE}% is below floor ${MOBILE_COVERAGE_FLOOR}%."
            exit 1
          fi

          if [ "$EVENT_NAME" = "pull_request" ]; then
            BASE_SHA="$PR_BASE_SHA"
          else
            BASE_SHA="$PUSH_BASE_SHA"
          fi

          if [ -z "$BASE_SHA" ] || [ "$BASE_SHA" = "0000000000000000000000000000000000000000" ]; then
            echo "Base SHA unavailable; skipping mobile coverage regression comparison."
            exit 0
          fi

          if ! git cat-file -e "${BASE_SHA}^{commit}" 2>/dev/null; then
            echo "Base SHA not available locally; skipping mobile coverage regression comparison."
            exit 0
          fi

          git checkout --quiet "$BASE_SHA"
          set +e
          (cd mobile && flutter test --coverage > /tmp/flutter_test_base.txt 2>&1)
          BASE_TEST_STATUS=$?
          set -e

          if [ $BASE_TEST_STATUS -ne 0 ]; then
            git checkout --quiet "$ORIGINAL_SHA"
            echo "Base revision mobile tests failed; skipping coverage regression comparison."
            exit 0
          fi

          cp mobile/coverage/lcov.info /tmp/mobile_lcov_base.info
          git checkout --quiet "$ORIGINAL_SHA"

          BASE_COVERAGE="$(python scripts/ci/check_lcov.py /tmp/mobile_lcov_base.info --threshold 0 "${EXCLUDE_ARGS[@]}" | awk '/^Coverage:/ {gsub("%", "", $2); print $2}')"
          if [ -z "$BASE_COVERAGE" ]; then
            echo "Unable to compute base mobile coverage."
            exit 1
          fi

          printf 'Base mobile coverage: %.2f%%\n' "$BASE_COVERAGE"

          set +e
          python -c "import sys; base=float('$BASE_COVERAGE'); head=float('$HEAD_COVERAGE'); sys.exit(0 if head + 1e-9 >= base else 2)"
          COVERAGE_COMPARE_STATUS=$?
          set -e
          if [ $COVERAGE_COMPARE_STATUS -ne 0 ]; then
            echo "Mobile coverage regressed compared to base revision."
            exit 1
          fi

          echo "Mobile coverage did not regress compared to base revision."

      - name: Provision Android Firebase config (optional)
        id: android_firebase
        working-directory: mobile
        env:
          ANDROID_GOOGLE_SERVICES_JSON: ${{ secrets.ANDROID_GOOGLE_SERVICES_JSON }}
        run: |
          if [ -f android/app/google-services.json ]; then
            echo "google-services.json found in repository checkout."
            echo "available=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [ -n "$ANDROID_GOOGLE_SERVICES_JSON" ]; then
            printf '%s' "$ANDROID_GOOGLE_SERVICES_JSON" > android/app/google-services.json
            echo "google-services.json written from secret ANDROID_GOOGLE_SERVICES_JSON."
            echo "available=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "google-services.json not available; skipping Android debug APK build for this CI run."
          echo "available=false" >> "$GITHUB_OUTPUT"

      - name: Build Android debug artifact
        if: steps.android_firebase.outputs.available == 'true'
        working-directory: mobile
        run: flutter build apk --debug

      - name: Skip Android debug artifact build
        if: steps.android_firebase.outputs.available != 'true'
        run: echo "Android debug APK build skipped because Firebase config is unavailable in CI context."

      - name: Upload mobile coverage report
        uses: actions/upload-artifact@v4
        with:
          name: mobile-lcov
          path: mobile/coverage/lcov.info

      - name: Upload Android debug artifact
        if: steps.android_firebase.outputs.available == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: mobile-android-debug-apk
          path: mobile/build/app/outputs/flutter-apk/app-debug.apk

  backend_image:
    name: Build and Publish Backend Image
    needs:
      - secret_scan
      - backend_ci
      - mobile_ci
    if: >-
      github.ref == 'refs/heads/main' &&
      (
        github.event_name == 'push' ||
        (github.event_name == 'workflow_dispatch' && github.event.inputs.deploy == 'true')
      )
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      packages: write
    outputs:
      image_tag: ${{ steps.meta.outputs.image_tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup QEMU
        uses: docker/setup-qemu-action@v3

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image metadata
        id: meta
        run: echo "image_tag=sha-${GITHUB_SHA}" >> "$GITHUB_OUTPUT"

      - name: Build and push multi-arch image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile
          platforms: linux/arm64,linux/amd64
          push: true
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: |
            ${{ env.BACKEND_IMAGE_REPOSITORY }}:${{ steps.meta.outputs.image_tag }}
            ${{ env.BACKEND_IMAGE_REPOSITORY }}:latest-prod
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.title=smart-receipt-backend

      - name: Scan image for vulnerabilities
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: ${{ env.BACKEND_IMAGE_REPOSITORY }}:${{ steps.meta.outputs.image_tag }}
          format: table
          ignore-unfixed: true
          severity: CRITICAL,HIGH
          vuln-type: os,library
          exit-code: "1"

  deploy_backend_oci:
    name: Deploy Backend to OCI
    needs:
      - backend_image
    if: >-
      github.ref == 'refs/heads/main' &&
      (
        github.event_name == 'push' ||
        (github.event_name == 'workflow_dispatch' && github.event.inputs.deploy == 'true')
      )
    runs-on: ubuntu-latest
    timeout-minutes: 25
    environment: production
    env:
      SLACK_DEPLOY_WEBHOOK: ${{ secrets.SLACK_DEPLOY_WEBHOOK }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Configure SSH
        env:
          OCI_SSH_PRIVATE_KEY: ${{ secrets.OCI_SSH_PRIVATE_KEY }}
          OCI_KNOWN_HOST: ${{ secrets.OCI_KNOWN_HOST }}
        run: |
          mkdir -p ~/.ssh

          if [ -z "$OCI_SSH_PRIVATE_KEY" ]; then
            echo "Missing required secret: OCI_SSH_PRIVATE_KEY"
            exit 1
          fi

          # Support both real newlines and literal "\\n" sequences from secret stores.
          KEY_NORMALIZED="${OCI_SSH_PRIVATE_KEY//$'\\n'/$'\n'}"
          printf '%s\n' "$KEY_NORMALIZED" | sed 's/\r$//' > ~/.ssh/id_ed25519

          # If the key is base64-encoded, decode it.
          if ! grep -q "BEGIN .*PRIVATE KEY" ~/.ssh/id_ed25519; then
            if printf '%s' "$OCI_SSH_PRIVATE_KEY" | base64 --decode > ~/.ssh/id_ed25519 2>/dev/null; then
              sed -i 's/\r$//' ~/.ssh/id_ed25519
            else
              echo "OCI_SSH_PRIVATE_KEY format is invalid (expected private key text or base64-encoded key)."
              exit 1
            fi
          fi

          chmod 600 ~/.ssh/id_ed25519

          if ! ssh-keygen -y -f ~/.ssh/id_ed25519 >/dev/null 2>&1; then
            echo "Unable to parse OCI_SSH_PRIVATE_KEY; check key content and formatting."
            exit 1
          fi

          if [ -z "$OCI_KNOWN_HOST" ]; then
            echo "Missing required secret: OCI_KNOWN_HOST"
            exit 1
          fi

          printf '%s\n' "$OCI_KNOWN_HOST" >> ~/.ssh/known_hosts

      - name: Sync deployment assets
        run: |
          ssh "${{ secrets.OCI_USER }}@${{ secrets.OCI_HOST }}" "mkdir -p /mnt/data/smart-receipt-and-warranty-manager/deploy/scripts /mnt/data/smart-receipt-and-warranty-manager/secrets"
          scp deploy/docker-compose.prod.yml "${{ secrets.OCI_USER }}@${{ secrets.OCI_HOST }}:/mnt/data/smart-receipt-and-warranty-manager/deploy/docker-compose.prod.yml"
          scp deploy/.env.prod.example "${{ secrets.OCI_USER }}@${{ secrets.OCI_HOST }}:/mnt/data/smart-receipt-and-warranty-manager/deploy/.env.prod.example"
          scp deploy/scripts/oci_deploy.sh "${{ secrets.OCI_USER }}@${{ secrets.OCI_HOST }}:/mnt/data/smart-receipt-and-warranty-manager/deploy/scripts/oci_deploy.sh"

      - name: Execute deployment
        run: |
          ssh "${{ secrets.OCI_USER }}@${{ secrets.OCI_HOST }}" "chmod +x /mnt/data/smart-receipt-and-warranty-manager/deploy/scripts/oci_deploy.sh"
          ssh "${{ secrets.OCI_USER }}@${{ secrets.OCI_HOST }}" \
            "GHCR_USERNAME='${{ secrets.GHCR_USERNAME }}' GHCR_TOKEN='${{ secrets.GHCR_READ_TOKEN }}' IMAGE_REPOSITORY='${{ env.BACKEND_IMAGE_REPOSITORY }}' IMAGE_TAG='${{ needs.backend_image.outputs.image_tag }}' DEPLOY_DIR='/mnt/data/smart-receipt-and-warranty-manager/deploy' ENV_FILE='/mnt/data/smart-receipt-and-warranty-manager/.env.prod' SMOKE_TEST_URL='${{ secrets.DEPLOY_SMOKE_TEST_URL }}' SMOKE_TEST_TOKEN='${{ secrets.DEPLOY_SMOKE_TEST_TOKEN }}' /mnt/data/smart-receipt-and-warranty-manager/deploy/scripts/oci_deploy.sh"

      - name: Notify on deployment failure
        if: ${{ failure() && env.SLACK_DEPLOY_WEBHOOK != '' }}
        uses: slackapi/slack-github-action@v1.26.0
        with:
          payload: |
            {
              "text": ":rotating_light: Production deploy failed for ${{ github.repository }} at commit ${{ github.sha }}. Run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
            }
        env:
          SLACK_WEBHOOK_URL: ${{ env.SLACK_DEPLOY_WEBHOOK }}
