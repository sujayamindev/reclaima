## Reservation-only resources for local compose.
# mem_reservation is enforced in standalone Docker Compose.
# deploy.resources.reservations is kept for Swarm compatibility.
x-postgres-resources: &postgres-resources
  mem_reservation: "${DEV_POSTGRES_MEM_RESERVATION:-512M}"
  deploy:
    resources:
      reservations:
        cpus: "${DEV_POSTGRES_CPU_RESERVATION:-0.25}"
        memory: "${DEV_POSTGRES_MEM_RESERVATION:-512M}"

x-backend-resources: &backend-resources
  mem_reservation: "${DEV_BACKEND_MEM_RESERVATION:-768M}"
  deploy:
    resources:
      reservations:
        cpus: "${DEV_BACKEND_CPU_RESERVATION:-0.50}"
        memory: "${DEV_BACKEND_MEM_RESERVATION:-768M}"

x-pgadmin-resources: &pgadmin-resources
  mem_reservation: "${DEV_PGADMIN_MEM_RESERVATION:-256M}"
  deploy:
    resources:
      reservations:
        cpus: "${DEV_PGADMIN_CPU_RESERVATION:-0.10}"
        memory: "${DEV_PGADMIN_MEM_RESERVATION:-256M}"

services:
  # PostgreSQL Database
  postgres:
    <<: *postgres-resources
    image: postgres:15-alpine
    container_name: smart-receipt-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: CR5#zhQRHk2zxL*4tCFcbN5Reg
      POSTGRES_DB: smart_receipt_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - smart-receipt-network

  # FastAPI Backend
  backend:
    <<: *backend-resources
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: smart-receipt-api
    env_file:
      - ./backend/.env  # Read all env vars from backend/.env
    environment:
      # Override database URL to use Docker service name
      DATABASE_URL: postgresql://postgres:CR5#zhQRHk2zxL*4tCFcbN5Reg@postgres:5432/smart_receipt_db
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - ./backend/firebase-service-account.json:/app/firebase-service-account.json:ro
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - smart-receipt-network
    command: >
      sh -c "
        echo 'Waiting for database...' &&
        sleep 5 &&
        echo 'Running migrations...' &&
        alembic upgrade head &&
        echo 'Starting FastAPI server...' &&
        uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
      "

  # pgAdmin (Optional - for database management)
  pgadmin:
    <<: *pgadmin-resources
    image: dpage/pgadmin4:latest
    container_name: smart-receipt-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@smartreceipt.com
      PGADMIN_DEFAULT_PASSWORD: CR5#zhQRHk2zxL*4tCFcbN5Reg
      PGADMIN_CONFIG_SERVER_MODE: 'False'
    ports:
      - "5050:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    depends_on:
      - postgres
    networks:
      - smart-receipt-network
    profiles:
      - tools  # Only start with: docker-compose --profile tools up

volumes:
  postgres_data:
    driver: local
  pgadmin_data:
    driver: local

networks:
  smart-receipt-network:
    driver: bridge