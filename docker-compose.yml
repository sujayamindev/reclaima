version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: smart-receipt-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: smart_receipt_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - smart-receipt-network

  # FastAPI Backend
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: smart-receipt-api
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/smart_receipt_db
      SECRET_KEY: dev-secret-key-change-in-production
      DEBUG: "true"
      ALLOWED_ORIGINS: http://localhost:8000,http://localhost:3000
      USE_MOCK_AWS: "true"
      AWS_ACCESS_KEY_ID: mock_access_key
      AWS_SECRET_ACCESS_KEY: mock_secret_key
      AWS_REGION: us-east-1
      AWS_S3_BUCKET: smart-receipt-storage
      FIREBASE_SERVICE_ACCOUNT_PATH: /app/firebase-service-account.json
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - ./backend/firebase-service-account.json:/app/firebase-service-account.json:ro
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - smart-receipt-network
    command: >
      sh -c "
        echo 'Waiting for database...' &&
        sleep 5 &&
        echo 'Running migrations...' &&
        alembic upgrade head &&
        echo 'Starting FastAPI server...' &&
        uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
      "

  # pgAdmin (Optional - for database management)
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: smart-receipt-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@smartreceipt.com
      PGADMIN_DEFAULT_PASSWORD: admin
      PGADMIN_CONFIG_SERVER_MODE: 'False'
    ports:
      - "5050:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    depends_on:
      - postgres
    networks:
      - smart-receipt-network
    profiles:
      - tools  # Only start with: docker-compose --profile tools up

volumes:
  postgres_data:
    driver: local
  pgadmin_data:
    driver: local

networks:
  smart-receipt-network:
    driver: bridge
